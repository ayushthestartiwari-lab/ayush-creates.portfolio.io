<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE AHEAD // Labs</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <main id="app">
        <!-- SCREEN 1: LANDING -->
        <section id="home" class="screen active">
            <div class="hero">
                <div class="quote-wrap">
                    <h1 class="reveal">MOVE FAST</h1>
                    <h1 class="reveal offset">BE AHEAD</h1>
                </div>
                <button class="nav-btn" onclick="nav('explorer')">ENTER_PROJECTS</button>
            </div>
        </section>

        <!-- SCREEN 2: EXPLORER -->
        <section id="explorer" class="screen">
            <div class="explorer-layout">
                <aside class="sidebar">
                    <div class="logo-small">BE AHEAD</div>
                    <div class="filter-section">
                        <p class="label">LANGUAGE</p>
                        <ul id="lang-list">
                            <li class="active" onclick="setFilter('lang', 'All', this)">ALL</li>
                            <li onclick="setFilter('lang', 'Python', this)">PYTHON</li>
                            <li onclick="setFilter('lang', 'Java', this)">JAVA</li>
                            <li onclick="setFilter('lang', 'JavaScript', this)">JAVASCRIPT</li>
                            <li onclick="setFilter('lang', 'Go', this)">GOLANG</li>
                            <li onclick="setFilter('lang', 'Rust', this)">RUST</li>
                        </ul>
                    </div>
                    <div class="filter-section">
                        <p class="label">LEVEL</p>
                        <ul id="diff-list">
                            <li class="active" onclick="setFilter('diff', 'All', this)">ANY</li>
                            <li onclick="setFilter('diff', 'Beginner', this)">BEGINNER</li>
                            <li onclick="setFilter('diff', 'Advanced', this)">ADVANCED</li>
                        </ul>
                    </div>
                    <button class="back-link" onclick="nav('home')">← EXIT</button>
                </aside>

                <div class="main-content">
                    <div id="project-grid" class="bento-grid">
                        <!-- Projects injected here -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
