<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BE AHEAD // Labs</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Grainy texture overlay for premium feel -->
    <div class="noise"></div>

    <main id="app">
        <!-- SCREEN 1: THE HERO -->
        <section id="home" class="screen active">
            <nav class="top-nav">
                <span class="logo">BE AHEAD</span>
                <span class="status">SYSTEM_READY</span>
            </nav>
            
            <div class="hero-center">
                <div class="v-stack">
                    <h1 class="reveal-text">MOVE FAST</h1>
                    <h1 class="reveal-text offset">BE AHEAD</h1>
                </div>
                <button class="cybr-btn" onclick="nav('explorer')">
                    LAUNCH_EXPLORER<span aria-hidden>_</span>
                </button>
            </div>
        </section>

        <!-- SCREEN 2: THE EXPLORER -->
        <section id="explorer" class="screen">
            <div class="explorer-ui">
                <aside class="sidebar">
                    <div class="filter-group">
                        <label>STACK</label>
                        <ul id="lang-list">
                            <li class="active" onclick="setFilter('lang', 'All', this)">ALL_DEPS</li>
                            <li onclick="setFilter('lang', 'Python', this)">PYTHON</li>
                            <li onclick="setFilter('lang', 'Rust', this)">RUST</li>
                            <li onclick="setFilter('lang', 'Go', this)">GOLANG</li>
                            <li onclick="setFilter('lang', 'JavaScript', this)">JS_TS</li>
                        </ul>
                    </div>
                    <div class="filter-group">
                        <label>TIER</label>
                        <ul id="diff-list">
                            <li class="active" onclick="setFilter('diff', 'All', this)">LEVEL_ANY</li>
                            <li onclick="setFilter('diff', 'Beginner', this)">L1_CORE</li>
                            <li onclick="setFilter('diff', 'Advanced', this)">L2_ADVANCED</li>
                        </ul>
                    </div>
                    <button class="back-btn" onclick="nav('home')">TERMINATE_SESSION</button>
                </aside>

                <div class="content-area">
                    <div id="project-grid" class="bento-grid">
                        <!-- JS Injection -->
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
