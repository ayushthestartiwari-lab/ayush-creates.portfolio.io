<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workspace | Be Ahead</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fira+Code&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fafafa; }
        .code-font { font-family: 'Fira Code', monospace; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        
        /* Code display vertical formatting */
        pre { white-space: pre-wrap; word-wrap: break-word; overflow-wrap: break-word; }
        code { display: block; line-height: 1.8; }
    </style>
</head>
<body>

    <nav class="glass-nav border-b border-gray-100 sticky top-0 z-50 py-4 px-10 flex justify-between items-center">
        <div class="font-extrabold text-xl tracking-tighter">Be <span class="text-blue-600">Ahead.</span></div>
        <div id="lang-title" class="text-xs font-bold uppercase tracking-widest text-gray-400">Language</div>
        <a href="index.html" class="text-sm font-semibold text-gray-500 hover:text-black transition">← Back</a>
    </nav>

    <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-10 p-10">
        <!-- Sidebar -->
        <aside class="w-full md:w-64 space-y-8">
            <div>
                <h3 class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-4">Difficulty</h3>
                <div class="flex gap-2">
                    <button onclick="setDifficulty('beginner')" id="btn-beginner" class="px-4 py-2 bg-blue-600 text-white rounded-full text-xs font-bold transition">Beginner</button>
                    <button onclick="setDifficulty('advanced')" id="btn-advanced" class="px-4 py-2 bg-white border border-gray-100 text-gray-400 rounded-full text-xs font-bold hover:bg-gray-50 transition">Advanced</button>
                </div>
            </div>
            <nav class="space-y-2">
                <h3 class="text-[10px] font-black uppercase text-gray-400 tracking-[0.2em] mb-4">Learning Path</h3>
                <button onclick="showLesson(1)" id="lesson-1" class="w-full text-left p-3 bg-white rounded-xl text-sm font-bold text-blue-600 shadow-sm border border-blue-50 transition hover:bg-blue-50">📖 01. Basics</button>
                <button onclick="showLesson(2)" id="lesson-2" class="w-full text-left p-3 text-sm font-medium text-gray-400 hover:text-black hover:bg-gray-50 rounded-xl transition">💻 02. Implementation</button>
                <button onclick="showLesson(3)" id="lesson-3" class="w-full text-left p-3 text-sm font-medium text-gray-400 hover:text-black hover:bg-gray-50 rounded-xl transition">🚀 03. Advanced</button>
                <button onclick="showLesson(4)" id="lesson-4" class="w-full text-left p-3 text-sm font-medium text-gray-400 hover:text-black hover:bg-gray-50 rounded-xl transition">✅ 04. Projects</button>
            </nav>
            <div class="bg-blue-50 border border-blue-100 rounded-xl p-4">
                <p class="text-xs font-semibold text-blue-900">💡 Pro Tip</p>
                <p class="text-xs text-blue-700 mt-2">Copy the code and practice locally. Modify it to learn faster!</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 space-y-8">
            <header>
                <h1 id="project-name" class="text-4xl font-extrabold text-gray-900 mb-4 tracking-tight">Project Title</h1>
                <p id="project-desc" class="text-gray-500 text-lg leading-relaxed max-w-2xl">Description of the project goes here...</p>
            </header>

            <div class="relative group">
                <!-- Terminal UI -->
                <div class="bg-[#0f172a] rounded-3xl overflow-hidden shadow-2xl border border-gray-800">
                    <div class="bg-[#1e293b] px-6 py-4 flex justify-between items-center border-b border-gray-800">
                        <div class="flex gap-2">
                            <div class="w-3 h-3 rounded-full bg-red-500/20 border border-red-500/40"></div>
                            <div class="w-3 h-3 rounded-full bg-yellow-500/20 border border-yellow-500/40"></div>
                            <div class="w-3 h-3 rounded-full bg-green-500/20 border border-green-500/40"></div>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="downloadCode()" class="text-[10px] font-bold text-gray-500 uppercase hover:text-white transition tracking-widest">⬇️ Download</button>
                            <button onclick="copyToClipboard()" class="text-[10px] font-bold text-gray-500 uppercase hover:text-white transition tracking-widest">📋 Copy</button>
                        </div>
                    </div>
                    <pre class="p-8 !m-0 overflow-x-auto max-h-96"><code id="code-display" class="code-font text-blue-400"></code></pre>
                </div>
                <!-- Success Toast -->
                <div id="copy-toast" class="absolute top-4 right-4 bg-green-500 text-white text-[10px] font-bold px-3 py-1 rounded-lg opacity-0 transition-opacity">✓ COPIED!</div>
                <div id="download-toast" class="absolute top-4 right-40 bg-blue-500 text-white text-[10px] font-bold px-3 py-1 rounded-lg opacity-0 transition-opacity">⬇️ DOWNLOADING...</div>
            </div>
        </main>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="script.js"></script>
    <script>
        let currentDifficulty = 'beginner';
        let currentLesson = 1;
        let currentLang = '';
        
        const lessonContent = {
            1: {
                title: '📖 01. Basics',
                description: 'Learn the fundamentals and core concepts',
                topics: ['Variables & Data Types', 'Control Flow', 'Functions', 'Basic Syntax'],
                tips: 'Start by understanding the basic syntax and how the language works. Practice with simple examples.'
            },
            2: {
                title: '💻 02. Implementation',
                description: 'Build real-world projects and practice',
                topics: ['Working with APIs', 'File I/O', 'Error Handling', 'Best Practices'],
                tips: 'Apply what you learned to build small projects. Use external libraries and follow coding standards.'
            },
            3: {
                title: '🚀 03. Advanced',
                description: 'Master complex patterns and optimization',
                topics: ['Design Patterns', 'Performance Optimization', 'Advanced Features', 'Async Programming'],
                tips: 'Learn advanced techniques for writing efficient and maintainable code. Study design patterns.'
            },
            4: {
                title: '✅ 04. Projects',
                description: 'Build your portfolio with complete projects',
                topics: ['Full Stack Development', 'Deployment', 'Testing', 'Documentation'],
                tips: 'Create complete, deployable projects. Build a portfolio that showcases your skills.'
            }
        };
        
        function setDifficulty(level) {
            currentDifficulty = level;
            document.getElementById('btn-beginner').classList.toggle('bg-blue-600', level === 'beginner');
            document.getElementById('btn-beginner').classList.toggle('text-white', level === 'beginner');
            document.getElementById('btn-beginner').classList.toggle('bg-white', level !== 'beginner');
            document.getElementById('btn-beginner').classList.toggle('text-gray-400', level !== 'beginner');
            document.getElementById('btn-beginner').classList.toggle('border', level !== 'beginner');
            document.getElementById('btn-beginner').classList.toggle('border-gray-100', level !== 'beginner');
            
            document.getElementById('btn-advanced').classList.toggle('bg-blue-600', level === 'advanced');
            document.getElementById('btn-advanced').classList.toggle('text-white', level === 'advanced');
            document.getElementById('btn-advanced').classList.toggle('bg-white', level !== 'advanced');
            document.getElementById('btn-advanced').classList.toggle('text-gray-400', level !== 'advanced');
            document.getElementById('btn-advanced').classList.toggle('border', level !== 'advanced');
            document.getElementById('btn-advanced').classList.toggle('border-gray-100', level !== 'advanced');
            
            const params = new URLSearchParams(window.location.search);
            const lang = params.get('lang');
            
            if (lang && projectLibrary[lang]) {
                const data = getRandomProject(lang);
                const codeElement = document.getElementById('code-display');
                codeElement.innerText = level === 'beginner' ? data.beginner : data.advanced;
                codeElement.className = `language-${lang}`;
                if (window.Prism) Prism.highlightElement(codeElement);
                
                const levelText = level === 'beginner' ? 'Beginner' : 'Advanced';
                document.getElementById('project-name').innerText = `${data.title} (${levelText})`;
            }
        }
        
        function showLesson(lessonNum) {
            currentLesson = lessonNum;
            const lessons = document.querySelectorAll('#lesson-1, #lesson-2, #lesson-3, #lesson-4');
            lessons.forEach((btn, idx) => {
                if (idx + 1 === lessonNum) {
                    btn.classList.add('bg-white', 'text-blue-600', 'font-bold', 'shadow-sm', 'border-blue-50', 'border');
                    btn.classList.remove('text-gray-400', 'font-medium');
                } else {
                    btn.classList.remove('bg-white', 'text-blue-600', 'font-bold', 'shadow-sm', 'border-blue-50', 'border');
                    btn.classList.add('text-gray-400', 'font-medium');
                }
            });
            
            const lesson = lessonContent[lessonNum];
            const projectDesc = document.getElementById('project-desc');
            
            let topicsHTML = '<strong>Topics:</strong><br>';
            lesson.topics.forEach(topic => {
                topicsHTML += `• ${topic}<br>`;
            });
            
            projectDesc.innerHTML = `<strong>${lesson.description}</strong><br><br>${topicsHTML}<br><strong>💡 Tip:</strong> ${lesson.tips}`;
        }
    </script>

    <footer class="mt-20 border-t border-gray-100">
      <div class="mx-auto max-w-7xl py-6 text-center">
        <p class="text-[10px] tracking-[0.3em] uppercase text-gray-500">
          DEVELOPED BY <span class="text-blue-600">AYUSH TIWARY</span>
        </p>
      </div>
    </footer>
</body>
</html>
